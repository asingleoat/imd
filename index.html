<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Distortion Product Chord Explorer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Distortion Product Chord Explorer</h1>

  <div id="controls">
    <div class="control-group">
      <label for="tuning-select">Tuning</label>
      <select id="tuning-select">
        <option value="12tet">12-TET</option>
        <option value="just">Just</option>
      </select>
    </div>
    <div class="control-group">
      <label for="root-select">Key</label>
      <select id="root-select"></select>
    </div>
    <div class="control-group">
      <label for="octave-select">Octave</label>
      <select id="octave-select"></select>
    </div>
    <div class="control-group">
      <label for="chord-select">Chord</label>
      <select id="chord-select"></select>
    </div>
    <div class="control-group">
      <label for="voicing-select">Voicing</label>
      <select id="voicing-select"></select>
    </div>
    <div class="control-group">
      <label>&nbsp;</label>
      <button id="play-btn">Play</button>
    </div>
  </div>

  <div id="distortion-controls">
    <label class="toggle">
      <span>Chord vol</span>
      <input type="range" id="chord-volume" min="0" max="200" value="100" step="5">
      <span id="chord-volume-label">100%</span>
    </label>
    <label class="toggle">
      <input type="checkbox" id="harmonic-toggle">
      <span>Harmonics</span>
    </label>
    <label class="toggle">
      <input type="checkbox" id="imd-toggle" checked>
      <span>Intermodulation</span>
    </label>
    <label class="toggle">
      <span>Depth</span>
      <input type="range" id="depth-slider" min="1" max="5" value="1" step="1">
      <span id="depth-label">1</span>
    </label>
    <label class="toggle">
      <input type="checkbox" id="delay-toggle" checked>
      <span>Delay</span>
    </label>
    <label class="toggle">
      <span>Products vol</span>
      <input type="range" id="distortion-volume" min="0" max="200" value="60" step="5">
      <span id="distortion-volume-label">60%</span>
    </label>
  </div>

  <div id="chord-display"></div>
  <div id="notes-display"></div>
  <div id="keyboard"></div>

  <div id="products-label">Distortion Products</div>
  <div id="keyboard-products"></div>

  <div id="signature-controls">
    <label class="toggle">
      <span>Tolerance</span>
      <input type="range" id="cents-threshold" min="1" max="50" value="10" step="1">
      <span id="cents-threshold-label">10¢</span>
    </label>
  </div>
  <div id="rational-signature">
    <div class="sig-row"><span class="sig-label">from bass:</span> <span id="sig-bottom" class="sig-cells"></span></div>
    <div class="sig-row"><span class="sig-label">from root:</span> <span id="sig-root" class="sig-cells"></span></div>
    <div class="sig-row"><span class="sig-label"></span> <span id="sig-names" class="sig-cells sig-names"></span></div>
    <div id="sig-chord-name"></div>
  </div>
  <div id="tuning-info">12-TET · A4 = 440 Hz</div>

  <script type="module" src="app.js"></script>
</body>
</html>
